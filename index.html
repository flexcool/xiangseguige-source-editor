<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>XBS Editor — 香色闺阁书源编辑器</title>
    <style>
      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --surface2: #22263a;
        --border: #2e3350;
        --accent: #6c8fff;
        --accent2: #a78bfa;
        --green: #34d399;
        --red: #f87171;
        --yellow: #fbbf24;
        --text: #e2e8f0;
        --text2: #94a3b8;
        --text3: #64748b;
        --radius: 10px;
        --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ── */
      header {
        padding: 18px 32px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 16px;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .logo {
        font-size: 20px;
        font-weight: 700;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.3px;
      }
      .logo-sub {
        color: var(--text3);
        font-size: 13px;
        font-weight: 400;
        -webkit-text-fill-color: var(--text3);
      }
      header .spacer {
        flex: 1;
      }
      .header-badge {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 4px 12px;
        font-size: 12px;
        color: var(--text3);
      }

      /* ── Layout ── */
      main {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto 1fr auto;
        gap: 0;
        max-width: 1600px;
        width: 100%;
        margin: 0 auto;
        padding: 24px;
        gap: 20px;
      }
      .toolbar {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      /* ── Buttons ── */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 9px 18px;
        border-radius: var(--radius);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        border: none;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent), #4f6ef7);
        color: #fff;
      }
      .btn-primary:hover {
        filter: brightness(1.12);
      }
      .btn-secondary {
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .btn-secondary:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .btn-success {
        background: linear-gradient(135deg, #059669, #34d399);
        color: #fff;
      }
      .btn-success:hover {
        filter: brightness(1.1);
      }
      .btn-warning {
        background: linear-gradient(135deg, #d97706, var(--yellow));
        color: #fff;
      }
      .btn-warning:hover {
        filter: brightness(1.1);
      }
      .btn-danger {
        background: linear-gradient(135deg, #dc2626, var(--red));
        color: #fff;
      }
      .btn-danger:hover {
        filter: brightness(1.1);
      }
      .btn-sm {
        padding: 6px 12px;
        font-size: 13px;
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }

      /* ── Drop zone ── */
      .dropzone {
        border: 2px dashed var(--border);
        border-radius: var(--radius);
        padding: 32px 24px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        background: var(--surface);
        position: relative;
      }
      .dropzone.drag-over {
        border-color: var(--accent);
        background: rgba(108, 143, 255, 0.08);
      }
      .dropzone-icon {
        font-size: 36px;
        margin-bottom: 10px;
      }
      .dropzone-title {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .dropzone-sub {
        font-size: 13px;
        color: var(--text3);
      }
      .dropzone input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
      }

      /* ── Panel ── */
      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-height: 0;
      }
      .panel-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--surface2);
        flex-shrink: 0;
      }
      .panel-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text2);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .panel-title span {
        color: var(--text3);
        font-weight: 400;
        font-size: 12px;
        text-transform: none;
        margin-left: 6px;
      }
      .panel-actions {
        margin-left: auto;
        display: flex;
        gap: 6px;
      }
      .panel-body {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      /* ── Editor ── */
      .editor-wrap {
        flex: 1;
        display: flex;
        overflow: hidden;
        min-height: 400px;
      }
      .line-nums {
        padding: 12px 8px 12px 12px;
        background: var(--surface2);
        color: var(--text3);
        font-family:
          "JetBrains Mono", "Fira Code", "Cascadia Code", "SF Mono", monospace;
        font-size: 13px;
        line-height: 1.6;
        text-align: right;
        user-select: none;
        overflow: hidden;
        min-width: 50px;
        border-right: 1px solid var(--border);
        white-space: pre;
      }
      textarea {
        flex: 1;
        background: var(--surface);
        color: var(--text);
        border: none;
        outline: none;
        resize: none;
        font-family:
          "JetBrains Mono", "Fira Code", "Cascadia Code", "SF Mono", monospace;
        font-size: 13px;
        line-height: 1.6;
        padding: 12px 16px;
        overflow-y: auto;
        overflow-x: auto;
        white-space: pre;
        tab-size: 2;
      }
      textarea::selection {
        background: rgba(108, 143, 255, 0.25);
      }
      textarea::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      textarea::-webkit-scrollbar-track {
        background: transparent;
      }
      textarea::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }

      /* ── Status bar ── */
      .status-bar {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 8px 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-size: 12px;
        color: var(--text3);
        flex-wrap: wrap;
      }
      .status-item {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--text3);
      }
      .status-dot.ok {
        background: var(--green);
      }
      .status-dot.err {
        background: var(--red);
      }
      .status-dot.warn {
        background: var(--yellow);
      }

      /* ── Source table ── */
      .source-table-wrap {
        grid-column: 1 / -1;
        display: none;
      }
      .source-table-wrap.visible {
        display: block;
      }
      .source-table-outer {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }
      .table-toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--surface2);
        flex-wrap: wrap;
      }
      .search-input {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        padding: 7px 12px;
        font-size: 13px;
        outline: none;
        width: 260px;
        transition: border-color 0.2s;
      }
      .search-input:focus {
        border-color: var(--accent);
      }
      .search-input::placeholder {
        color: var(--text3);
      }
      .table-count {
        color: var(--text3);
        font-size: 13px;
        margin-left: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      th {
        padding: 10px 14px;
        text-align: left;
        color: var(--text3);
        font-weight: 600;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        border-bottom: 1px solid var(--border);
        background: var(--surface2);
        cursor: pointer;
        user-select: none;
        white-space: nowrap;
      }
      th:hover {
        color: var(--text);
      }
      th.sort-asc::after {
        content: " ↑";
        color: var(--accent);
      }
      th.sort-desc::after {
        content: " ↓";
        color: var(--accent);
      }
      td {
        padding: 9px 14px;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
        max-width: 260px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: rgba(108, 143, 255, 0.04);
      }
      .tag {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 600;
      }
      .tag-on {
        background: rgba(52, 211, 153, 0.15);
        color: var(--green);
      }
      .tag-off {
        background: rgba(100, 116, 139, 0.15);
        color: var(--text3);
      }
      .url-cell {
        color: var(--accent);
        font-size: 12px;
      }
      .table-scroll {
        overflow-x: auto;
        max-height: 480px;
        overflow-y: auto;
      }
      .table-scroll::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      .table-scroll::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }

      /* ── Toast ── */
      .toast-container {
        position: fixed;
        bottom: 24px;
        right: 24px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 9999;
      }
      .toast {
        padding: 12px 18px;
        border-radius: var(--radius);
        font-size: 14px;
        font-weight: 500;
        min-width: 220px;
        max-width: 360px;
        animation: slideIn 0.25s ease;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .toast-ok {
        background: #064e3b;
        border: 1px solid #065f46;
        color: var(--green);
      }
      .toast-err {
        background: #450a0a;
        border: 1px solid #7f1d1d;
        color: var(--red);
      }
      .toast-info {
        background: #1e1b4b;
        border: 1px solid #312e81;
        color: #a5b4fc;
      }
      @keyframes slideIn {
        from {
          transform: translateX(40px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      @keyframes slideOut {
        from {
          transform: translateX(0);
          opacity: 1;
        }
        to {
          transform: translateX(40px);
          opacity: 0;
        }
      }

      /* ── Divider ── */
      .convert-arrow {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 4px 0;
      }
      .arrow-line {
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .arrow-btns {
        display: flex;
        gap: 10px;
      }

      /* ── Responsive ── */
      @media (max-width: 900px) {
        main {
          grid-template-columns: 1fr;
          padding: 16px;
        }
        .convert-arrow {
          flex-direction: column;
        }
        .arrow-line {
          width: 100%;
          height: 1px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <div class="logo">
          XBS Editor <span class="logo-sub">香色闺阁书源编辑器</span>
        </div>
      </div>
      <div class="spacer"></div>
      <div class="header-badge">纯前端 · 无服务器 · 数据本地处理</div>
    </header>

    <main>
      <!-- Toolbar -->
      <div class="toolbar">
        <label
          class="btn btn-primary"
          style="cursor: pointer"
        >
          📂 导入 XBS
          <input
            type="file"
            id="importXbs"
            accept=".xbs"
            style="display: none"
          />
        </label>
        <label
          class="btn btn-secondary"
          style="cursor: pointer"
        >
          📄 导入 JSON
          <input
            type="file"
            id="importJson"
            accept=".json"
            style="display: none"
          />
        </label>
        <div style="flex: 1"></div>
        <button
          class="btn btn-secondary"
          id="toggleTable"
        >
          📋 书源列表
        </button>
        <button
          class="btn btn-warning"
          id="formatBtn"
        >
          ✨ 格式化 JSON
        </button>
        <button
          class="btn btn-success"
          id="exportJson"
        >
          ⬇ 导出 JSON
        </button>
        <button
          class="btn btn-primary"
          id="exportXbs"
        >
          ⬇ 导出 XBS
        </button>
      </div>

      <!-- XBS Drop Zone -->
      <div
        class="dropzone"
        id="xbsDrop"
      >
        <div class="dropzone-icon">🔒</div>
        <div class="dropzone-title">拖拽 .xbs 文件到此处</div>
        <div class="dropzone-sub">或点击选择文件 · 将自动解密并转为 JSON</div>
        <input
          type="file"
          accept=".xbs"
          id="xbsDropInput"
        />
      </div>

      <!-- JSON Drop Zone -->
      <div
        class="dropzone"
        id="jsonDrop"
      >
        <div class="dropzone-icon">📝</div>
        <div class="dropzone-title">拖拽 .json 文件到此处</div>
        <div class="dropzone-sub">或点击选择文件 · 将导入为可编辑 JSON</div>
        <input
          type="file"
          accept=".json"
          id="jsonDropInput"
        />
      </div>

      <!-- Convert arrows -->
      <div class="convert-arrow">
        <div class="arrow-line"></div>
        <div class="arrow-btns">
          <button
            class="btn btn-primary"
            id="xbs2json"
          >
            🔓 XBS → JSON
          </button>
          <button
            class="btn btn-warning"
            id="json2xbs"
          >
            🔐 JSON → XBS
          </button>
        </div>
        <div class="arrow-line"></div>
      </div>

      <!-- XBS Panel -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">
            XBS 文件 <span id="xbsInfo">未加载</span>
          </div>
          <div class="panel-actions">
            <button
              class="btn btn-sm btn-secondary"
              id="clearXbs"
            >
              清除
            </button>
            <button
              class="btn btn-sm btn-primary"
              id="dlXbs"
            >
              ⬇ 下载
            </button>
          </div>
        </div>
        <div class="panel-body">
          <div class="editor-wrap">
            <div
              class="line-nums"
              id="xbsLineNums"
            >
              —
            </div>
            <textarea
              id="xbsArea"
              placeholder="XBS 文件内容（十六进制预览）"
              readonly
              spellcheck="false"
            ></textarea>
          </div>
        </div>
      </div>

      <!-- JSON Panel -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">
            JSON 内容 <span id="jsonInfo">未加载</span>
          </div>
          <div class="panel-actions">
            <button
              class="btn btn-sm btn-secondary"
              id="clearJson"
            >
              清除
            </button>
            <button
              class="btn btn-sm btn-success"
              id="dlJson"
            >
              ⬇ 下载
            </button>
          </div>
        </div>
        <div class="panel-body">
          <div class="editor-wrap">
            <div
              class="line-nums"
              id="jsonLineNums"
            >
              1
            </div>
            <textarea
              id="jsonArea"
              placeholder="在此粘贴或编辑 JSON 内容..."
              spellcheck="false"
            ></textarea>
          </div>
        </div>
      </div>

      <!-- Status Bar -->
      <div
        class="status-bar"
        id="statusBar"
      >
        <div class="status-item">
          <div
            class="status-dot"
            id="statusDot"
          ></div>
          <span id="statusText">就绪 · 请导入文件</span>
        </div>
        <div
          class="status-item"
          id="statusBytes"
          style="display: none"
        >
          📦 <span></span>
        </div>
        <div
          class="status-item"
          id="statusSources"
          style="display: none"
        >
          📚 <span></span>
        </div>
        <div
          class="status-item"
          id="statusTime"
          style="display: none"
        >
          ⏱ <span></span>
        </div>
        <div style="margin-left: auto; color: var(--text3); font-size: 11px">
          数据仅在浏览器本地处理，不上传至任何服务器
        </div>
      </div>

      <!-- Source Table -->
      <div
        class="source-table-wrap"
        id="sourceTableWrap"
      >
        <div class="source-table-outer">
          <div class="table-toolbar">
            <span style="font-size: 13px; font-weight: 600; color: var(--text2)"
              >📚 书源列表</span
            >
            <input
              type="text"
              class="search-input"
              id="searchInput"
              placeholder="搜索书源名称或网址…"
            />
            <div style="display: flex; gap: 6px">
              <button
                class="btn btn-sm btn-success"
                id="enableAll"
              >
                全部启用
              </button>
              <button
                class="btn btn-sm btn-danger"
                id="disableAll"
              >
                全部禁用
              </button>
            </div>
            <span
              class="table-count"
              id="tableCount"
            ></span>
          </div>
          <div class="table-scroll">
            <table>
              <thead>
                <tr>
                  <th data-sort="sourceName">书源名称</th>
                  <th data-sort="sourceUrl">网址</th>
                  <th data-sort="enable">状态</th>
                  <th data-sort="weight">权重</th>
                  <th data-sort="lastModifyTime">最后修改</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="sourceTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <div
      class="toast-container"
      id="toastContainer"
    ></div>

    <script>
      // ═══════════════════════════════════════════════════════
      // XXTEA Implementation (pure JS, standard CXXTEA)
      // Ported from yang3yen/xxtea-go — same algorithm
      // ═══════════════════════════════════════════════════════
      const XXTEA = (() => {
        const DELTA = 0x9e3779b9;

        function toUint32Array(bytes) {
          // Little-endian byte array → uint32 array
          const n = bytes.length;
          const len = Math.ceil(n / 4);
          const arr = new Uint32Array(len);
          for (let i = 0; i < n; i++) {
            arr[i >>> 2] |= bytes[i] << ((i & 3) << 3);
          }
          return arr;
        }

        function toByteArray(uint32arr, bytelen) {
          const bytes = new Uint8Array(bytelen);
          for (let i = 0; i < bytelen; i++) {
            bytes[i] = (uint32arr[i >>> 2] >>> ((i & 3) << 3)) & 0xff;
          }
          return bytes;
        }

        function mx(sum, y, z, p, e, k) {
          return (
            ((((z >>> 5) ^ (y << 2)) + ((y >>> 3) ^ (z << 4))) ^
              ((sum ^ y) + (k[(p & 3) ^ e] ^ z))) >>>
            0
          );
        }

        function encrypt(v, k) {
          // v: Uint32Array (modified in place), k: Uint32Array[4]
          const n = v.length;
          if (n < 2) return;
          let z = v[n - 1],
            y,
            sum = 0,
            e;
          const q = Math.floor(6 + 52 / n);
          for (let rounds = 0; rounds < q; rounds++) {
            sum = (sum + DELTA) >>> 0;
            e = (sum >>> 2) & 3;
            for (let p = 0; p < n - 1; p++) {
              y = v[p + 1];
              v[p] = (v[p] + mx(sum, y, z, p, e, k)) >>> 0;
              z = v[p];
            }
            y = v[0];
            v[n - 1] = (v[n - 1] + mx(sum, y, z, n - 1, e, k)) >>> 0;
            z = v[n - 1];
          }
        }

        function decrypt(v, k) {
          // v: Uint32Array (modified in place), k: Uint32Array[4]
          const n = v.length;
          if (n < 2) return;
          let y = v[0],
            z,
            e;
          const q = Math.floor(6 + 52 / n);
          let sum = (q * DELTA) >>> 0;
          for (let rounds = 0; rounds < q; rounds++) {
            e = (sum >>> 2) & 3;
            for (let p = n - 1; p > 0; p--) {
              z = v[p - 1];
              v[p] = (v[p] - mx(sum, y, z, p, e, k)) >>> 0;
              y = v[p];
            }
            z = v[n - 1];
            v[0] = (v[0] - mx(sum, y, z, 0, e, k)) >>> 0;
            y = v[0];
            sum = (sum - DELTA) >>> 0;
          }
        }

        // XBS hardcoded key (16 bytes → 4 uint32 LE)
        const KEY_BYTES = new Uint8Array([
          0xe5, 0x87, 0xbc, 0xe8, 0xa4, 0x86, 0xe6, 0xbb, 0xbf, 0xe9, 0x87,
          0x91, 0xe6, 0xba, 0xa1, 0xe5,
        ]);
        const KEY = toUint32Array(KEY_BYTES);

        return {
          /**
           * Decrypt XBS buffer → UTF-8 JSON string
           * Algorithm: XXTEA decrypt → strip length footer
           */
          xbs2json(buffer) {
            const encBytes = new Uint8Array(buffer);
            const totalLen = encBytes.length;
            if (totalLen < 8 || totalLen % 4 !== 0) {
              throw new Error(
                `文件长度异常 (${totalLen} bytes)，不是有效的 XBS 文件`,
              );
            }
            // Decrypt in place
            const v = toUint32Array(encBytes);
            decrypt(v, KEY);
            const decBytes = toByteArray(v, totalLen);

            // Read original length from last 4 bytes (little-endian uint32)
            const n = totalLen - 4;
            const m =
              decBytes[n] |
              (decBytes[n + 1] << 8) |
              (decBytes[n + 2] << 16) |
              (decBytes[n + 3] << 24);
            // Validate
            if (m < n - 3 || m > n) {
              throw new Error(
                `解密失败：长度校验不通过 (m=${m}, n=${n})，可能不是 XBS 文件或已损坏`,
              );
            }
            return new TextDecoder("utf-8").decode(decBytes.slice(0, m));
          },

          /**
           * Encrypt UTF-8 JSON string → XBS Uint8Array
           * Algorithm: pad to 4-byte boundary + append length uint32 LE → XXTEA encrypt
           */
          json2xbs(jsonStr) {
            const jsonBytes = new TextEncoder().encode(jsonStr);
            const bufLen = jsonBytes.length;
            // Pad to multiple of 4
            const n4 = Math.ceil(bufLen / 4);
            const padded = new Uint8Array(n4 * 4 + 4);
            padded.set(jsonBytes);
            // Write original length as uint32 LE
            padded[n4 * 4] = (bufLen >>> 0) & 0xff;
            padded[n4 * 4 + 1] = (bufLen >>> 8) & 0xff;
            padded[n4 * 4 + 2] = (bufLen >>> 16) & 0xff;
            padded[n4 * 4 + 3] = (bufLen >>> 24) & 0xff;
            // Encrypt
            const v = toUint32Array(padded);
            encrypt(v, KEY);
            return toByteArray(v, padded.length);
          },
        };
      })();

      // ═══════════════════════════════════════════════════════
      // App State
      // ═══════════════════════════════════════════════════════
      let xbsBuffer = null; // ArrayBuffer
      let xbsFileName = "output.xbs";
      let jsonFileName = "output.json";

      // ═══════════════════════════════════════════════════════
      // Utilities
      // ═══════════════════════════════════════════════════════
      function toast(msg, type = "ok") {
        const c = document.getElementById("toastContainer");
        const el = document.createElement("div");
        el.className = `toast toast-${type}`;
        const icon = type === "ok" ? "✅" : type === "err" ? "❌" : "ℹ️";
        el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
        c.appendChild(el);
        setTimeout(() => {
          el.style.animation = "slideOut 0.25s ease forwards";
          setTimeout(() => el.remove(), 250);
        }, 3200);
      }

      function setStatus(msg, type = "") {
        document.getElementById("statusText").textContent = msg;
        const dot = document.getElementById("statusDot");
        dot.className = "status-dot" + (type ? " " + type : "");
      }

      function showStatusExtra(bytes, sources, ms) {
        const b = document.getElementById("statusBytes");
        const s = document.getElementById("statusSources");
        const t = document.getElementById("statusTime");
        if (bytes !== null) {
          b.style.display = "flex";
          b.querySelector("span").textContent = formatBytes(bytes);
        }
        if (sources !== null) {
          s.style.display = "flex";
          s.querySelector("span").textContent = `${sources} 个书源`;
        }
        if (ms !== null) {
          t.style.display = "flex";
          t.querySelector("span").textContent = `${ms} ms`;
        }
      }

      function formatBytes(n) {
        if (n < 1024) return n + " B";
        if (n < 1048576) return (n / 1024).toFixed(1) + " KB";
        return (n / 1048576).toFixed(2) + " MB";
      }

      function updateLineNums(textareaId, lineNumId) {
        const ta = document.getElementById(textareaId);
        const ln = document.getElementById(lineNumId);
        const lines = (ta.value.match(/\n/g) || []).length + 1;
        if (ta.value === "") {
          ln.textContent = "—";
          return;
        }
        if (textareaId === "xbsArea") {
          ln.textContent = "…";
          return;
        }
        let s = "";
        for (let i = 1; i <= Math.min(lines, 9999); i++) s += i + "\n";
        ln.textContent = s;
        // Sync scroll
        ln.scrollTop = ta.scrollTop;
      }

      function setXbsHexPreview(buf) {
        xbsBuffer = buf;
        const bytes = new Uint8Array(buf);
        const lines = [];
        const perRow = 16;
        const maxRows = 256;
        for (
          let i = 0;
          i < Math.min(bytes.length, perRow * maxRows);
          i += perRow
        ) {
          const slice = bytes.slice(i, i + perRow);
          const hex = Array.from(slice)
            .map((b) => b.toString(16).padStart(2, "0"))
            .join(" ");
          const ascii = Array.from(slice)
            .map((b) => (b >= 32 && b < 127 ? String.fromCharCode(b) : "."))
            .join("");
          const addr = i.toString(16).padStart(8, "0");
          lines.push(`${addr}  ${hex.padEnd(perRow * 3 - 1)}  |${ascii}|`);
        }
        if (bytes.length > perRow * maxRows) {
          lines.push(
            `... (仅显示前 ${maxRows * perRow} 字节，共 ${bytes.length} 字节)`,
          );
        }
        const ta = document.getElementById("xbsArea");
        ta.value = lines.join("\n");
        updateLineNums("xbsArea", "xbsLineNums");
      }

      function downloadBlob(data, filename, mime) {
        const url = URL.createObjectURL(new Blob([data], { type: mime }));
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => {
          URL.revokeObjectURL(url);
          a.remove();
        }, 1000);
      }

      // ═══════════════════════════════════════════════════════
      // File Loading
      // ═══════════════════════════════════════════════════════
      function loadXbsFile(file) {
        xbsFileName = file.name.replace(/\.xbs$/i, "");
        const reader = new FileReader();
        reader.onload = (e) => {
          const buf = e.target.result;
          setXbsHexPreview(buf);
          document.getElementById("xbsInfo").textContent =
            `${file.name} · ${formatBytes(buf.byteLength)}`;
          setStatus("XBS 文件已加载，点击「XBS → JSON」解密", "warn");
          showStatusExtra(buf.byteLength, null, null);
          toast(`已载入 ${file.name} (${formatBytes(buf.byteLength)})`, "info");
        };
        reader.readAsArrayBuffer(file);
      }

      function loadJsonFile(file) {
        jsonFileName = file.name.replace(/\.json$/i, "");
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const text = e.target.result;
            const parsed = JSON.parse(text);
            document.getElementById("jsonArea").value = JSON.stringify(
              parsed,
              null,
              2,
            );
            document.getElementById("jsonInfo").textContent =
              `${file.name} · ${formatBytes(text.length)}`;
            updateLineNums("jsonArea", "jsonLineNums");
            countSources(parsed);
            setStatus("JSON 文件已加载，可直接编辑", "ok");
            toast(`已载入 ${file.name}`, "ok");
          } catch (err) {
            toast("JSON 解析失败：" + err.message, "err");
          }
        };
        reader.readAsText(file, "utf-8");
      }

      function countSources(parsed) {
        let count = 0;
        if (typeof parsed === "object" && !Array.isArray(parsed))
          count = Object.keys(parsed).length;
        else if (Array.isArray(parsed)) count = parsed.length;
        if (count > 0) showStatusExtra(null, count, null);
      }

      // ═══════════════════════════════════════════════════════
      // Convert
      // ═══════════════════════════════════════════════════════
      document.getElementById("xbs2json").addEventListener("click", () => {
        if (!xbsBuffer) {
          toast("请先导入 XBS 文件", "err");
          return;
        }
        const t0 = performance.now();
        try {
          const json = XXTEA.xbs2json(xbsBuffer);
          const parsed = JSON.parse(json);
          const pretty = JSON.stringify(parsed, null, 2);
          document.getElementById("jsonArea").value = pretty;
          document.getElementById("jsonInfo").textContent =
            `解密成功 · ${formatBytes(json.length)}`;
          updateLineNums("jsonArea", "jsonLineNums");
          const ms = Math.round(performance.now() - t0);
          countSources(parsed);
          showStatusExtra(null, null, ms);
          setStatus("解密成功！JSON 已可编辑", "ok");
          toast(`解密成功 · 耗时 ${ms}ms`, "ok");
          renderTable(parsed);
        } catch (err) {
          setStatus("解密失败：" + err.message, "err");
          toast(err.message, "err");
        }
      });

      document.getElementById("json2xbs").addEventListener("click", () => {
        const jsonText = document.getElementById("jsonArea").value.trim();
        if (!jsonText) {
          toast("请先填写或导入 JSON 内容", "err");
          return;
        }
        const t0 = performance.now();
        try {
          JSON.parse(jsonText); // validate
          const encrypted = XXTEA.json2xbs(jsonText);
          xbsBuffer = encrypted.buffer;
          setXbsHexPreview(xbsBuffer);
          document.getElementById("xbsInfo").textContent =
            `加密完成 · ${formatBytes(encrypted.length)}`;
          const ms = Math.round(performance.now() - t0);
          showStatusExtra(encrypted.length, null, ms);
          setStatus("加密成功！XBS 已就绪，可下载", "ok");
          toast(
            `加密成功 · ${formatBytes(encrypted.length)} · 耗时 ${ms}ms`,
            "ok",
          );
        } catch (err) {
          toast("加密失败：" + err.message, "err");
          setStatus("加密失败：" + err.message, "err");
        }
      });

      // ═══════════════════════════════════════════════════════
      // Download
      // ═══════════════════════════════════════════════════════
      document.getElementById("dlXbs").addEventListener("click", () => {
        if (!xbsBuffer) {
          toast("没有可下载的 XBS 内容", "err");
          return;
        }
        downloadBlob(
          xbsBuffer,
          xbsFileName + ".xbs",
          "application/octet-stream",
        );
        toast("XBS 文件下载中…", "ok");
      });
      document.getElementById("exportXbs").addEventListener("click", () => {
        document.getElementById("dlXbs").click();
      });

      document.getElementById("dlJson").addEventListener("click", () => {
        const v = document.getElementById("jsonArea").value;
        if (!v.trim()) {
          toast("没有可下载的 JSON 内容", "err");
          return;
        }
        downloadBlob(v, jsonFileName + ".json", "application/json");
        toast("JSON 文件下载中…", "ok");
      });
      document.getElementById("exportJson").addEventListener("click", () => {
        document.getElementById("dlJson").click();
      });

      // Format JSON
      document.getElementById("formatBtn").addEventListener("click", () => {
        const ta = document.getElementById("jsonArea");
        try {
          ta.value = JSON.stringify(JSON.parse(ta.value), null, 2);
          updateLineNums("jsonArea", "jsonLineNums");
          toast("格式化成功", "ok");
        } catch (e) {
          toast("JSON 格式错误：" + e.message, "err");
        }
      });

      // Clear
      document.getElementById("clearXbs").addEventListener("click", () => {
        xbsBuffer = null;
        document.getElementById("xbsArea").value = "";
        document.getElementById("xbsInfo").textContent = "未加载";
        updateLineNums("xbsArea", "xbsLineNums");
      });
      document.getElementById("clearJson").addEventListener("click", () => {
        document.getElementById("jsonArea").value = "";
        document.getElementById("jsonInfo").textContent = "未加载";
        updateLineNums("jsonArea", "jsonLineNums");
      });

      // ═══════════════════════════════════════════════════════
      // File inputs & Drop zones
      // ═══════════════════════════════════════════════════════
      function bindFileInput(inputId, handler) {
        document.getElementById(inputId).addEventListener("change", (e) => {
          if (e.target.files[0]) handler(e.target.files[0]);
          e.target.value = "";
        });
      }
      bindFileInput("importXbs", loadXbsFile);
      bindFileInput("importJson", loadJsonFile);
      bindFileInput("xbsDropInput", loadXbsFile);
      bindFileInput("jsonDropInput", loadJsonFile);

      function bindDropZone(zoneId, handler, mimeCheck) {
        const zone = document.getElementById(zoneId);
        zone.addEventListener("dragover", (e) => {
          e.preventDefault();
          zone.classList.add("drag-over");
        });
        zone.addEventListener("dragleave", () =>
          zone.classList.remove("drag-over"),
        );
        zone.addEventListener("drop", (e) => {
          e.preventDefault();
          zone.classList.remove("drag-over");
          const file = e.dataTransfer.files[0];
          if (file) handler(file);
        });
      }
      bindDropZone("xbsDrop", loadXbsFile);
      bindDropZone("jsonDrop", loadJsonFile);

      // ═══════════════════════════════════════════════════════
      // JSON textarea line nums & scroll sync
      // ═══════════════════════════════════════════════════════
      const jsonArea = document.getElementById("jsonArea");
      jsonArea.addEventListener("input", () =>
        updateLineNums("jsonArea", "jsonLineNums"),
      );
      jsonArea.addEventListener("scroll", () => {
        document.getElementById("jsonLineNums").scrollTop = jsonArea.scrollTop;
      });

      // ═══════════════════════════════════════════════════════
      // Source Table
      // ═══════════════════════════════════════════════════════
      let tableData = [];
      let sortKey = "sourceName";
      let sortDir = 1;
      let filterText = "";

      function renderTable(parsed) {
        if (typeof parsed !== "object" || Array.isArray(parsed)) return;
        tableData = Object.entries(parsed).map(([k, v]) => ({
          _key: k,
          sourceName: v.sourceName || k,
          sourceUrl: v.sourceUrl || "",
          enable: v.enable !== false,
          weight: typeof v.weight === "number" ? v.weight : 0,
          lastModifyTime: v.lastModifyTime || "",
          _raw: v,
        }));
        renderTableRows();
      }

      function renderTableRows() {
        const filter = filterText.toLowerCase();
        let rows = tableData.filter(
          (r) =>
            r.sourceName.toLowerCase().includes(filter) ||
            r.sourceUrl.toLowerCase().includes(filter),
        );
        rows.sort((a, b) => {
          let av = a[sortKey],
            bv = b[sortKey];
          if (typeof av === "boolean") av = av ? 1 : 0;
          if (typeof bv === "boolean") bv = bv ? 1 : 0;
          if (av < bv) return -sortDir;
          if (av > bv) return sortDir;
          return 0;
        });

        document.getElementById("tableCount").textContent =
          `共 ${rows.length} / ${tableData.length} 条`;
        const tbody = document.getElementById("sourceTableBody");
        tbody.innerHTML = "";
        rows.forEach((r) => {
          const tr = document.createElement("tr");
          const ts = r.lastModifyTime
            ? new Date(r.lastModifyTime).toLocaleDateString("zh-CN")
            : "—";
          tr.innerHTML = `
      <td title="${r.sourceName}">${r.sourceName}</td>
      <td class="url-cell" title="${r.sourceUrl}"><a href="${r.sourceUrl}" target="_blank" rel="noopener noreferrer" style="color:inherit">${r.sourceUrl || "—"}</a></td>
      <td><span class="tag ${r.enable ? "tag-on" : "tag-off"}">${r.enable ? "启用" : "禁用"}</span></td>
      <td>${r.weight}</td>
      <td>${ts}</td>
      <td style="display:flex;gap:5px">
        <button class="btn btn-sm btn-secondary" data-key="${r._key}" data-action="toggle">${r.enable ? "禁用" : "启用"}</button>
        <button class="btn btn-sm btn-danger" data-key="${r._key}" data-action="delete">删除</button>
      </td>
    `;
          tbody.appendChild(tr);
        });

        // Update sort indicators
        document.querySelectorAll("th[data-sort]").forEach((th) => {
          th.classList.remove("sort-asc", "sort-desc");
          if (th.dataset.sort === sortKey) {
            th.classList.add(sortDir === 1 ? "sort-asc" : "sort-desc");
          }
        });
      }

      document.getElementById("searchInput").addEventListener("input", (e) => {
        filterText = e.target.value;
        renderTableRows();
      });

      document.querySelectorAll("th[data-sort]").forEach((th) => {
        th.addEventListener("click", () => {
          if (sortKey === th.dataset.sort) sortDir = -sortDir;
          else {
            sortKey = th.dataset.sort;
            sortDir = 1;
          }
          renderTableRows();
        });
      });

      document
        .getElementById("sourceTableBody")
        .addEventListener("click", (e) => {
          const btn = e.target.closest("button[data-action]");
          if (!btn) return;
          const key = btn.dataset.key;
          const action = btn.dataset.action;
          const idx = tableData.findIndex((r) => r._key === key);
          if (idx < 0) return;
          if (action === "toggle") {
            tableData[idx].enable = !tableData[idx].enable;
            tableData[idx]._raw.enable = tableData[idx].enable;
          } else if (action === "delete") {
            tableData.splice(idx, 1);
          }
          syncTableToJson();
          renderTableRows();
        });

      document.getElementById("enableAll").addEventListener("click", () => {
        tableData.forEach((r) => {
          r.enable = true;
          r._raw.enable = true;
        });
        syncTableToJson();
        renderTableRows();
        toast(`已启用全部 ${tableData.length} 个书源`, "ok");
      });
      document.getElementById("disableAll").addEventListener("click", () => {
        tableData.forEach((r) => {
          r.enable = false;
          r._raw.enable = false;
        });
        syncTableToJson();
        renderTableRows();
        toast(`已禁用全部 ${tableData.length} 个书源`, "info");
      });

      function syncTableToJson() {
        const obj = {};
        tableData.forEach((r) => {
          obj[r._key] = r._raw;
        });
        document.getElementById("jsonArea").value = JSON.stringify(
          obj,
          null,
          2,
        );
        updateLineNums("jsonArea", "jsonLineNums");
      }

      // Toggle table visibility
      document.getElementById("toggleTable").addEventListener("click", () => {
        const wrap = document.getElementById("sourceTableWrap");
        const visible = wrap.classList.toggle("visible");
        document.getElementById("toggleTable").textContent = visible
          ? "🔼 收起列表"
          : "📋 书源列表";
        if (visible && tableData.length === 0) {
          const v = document.getElementById("jsonArea").value.trim();
          if (v) {
            try {
              renderTable(JSON.parse(v));
            } catch (e) {}
          }
        }
      });
    </script>
  </body>
</html>
